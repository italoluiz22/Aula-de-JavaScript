<!DOCTYPE html>
<html>
<head>

<title>Cadastro de Usuários</title>

<body>

<h2>Cadastro de Usuários</h2>

<button onclick="salvar()">Salvar</button>

<tr>
<th>ID</th>
<th>Nome</th>

</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<script src="script.js"></script>

</body>
</html>
